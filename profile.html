<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Profil — DompetKu</title>
<meta name="description" content="Kelola profil dan pengaturan akun DompetKu kamu." />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#22c55e" />
<link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png" />
<link rel="icon" type="image/png" href="assets/icon/favicon-32.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <div class="profile-header">
    <div class="avatar-lg"><span class="avatar-initial">?</span></div>
    <h2 id="profileName">Memuat...</h2>
    <div class="email" id="profileEmail">-</div>
  </div>

  <div class="stat-row">
    <div class="stat-box"><div class="num" id="statCount">0</div><div class="lbl">Transaksi</div></div>
    <div class="stat-box"><div class="num text-success" id="statIncome">Rp 0</div><div class="lbl">Pemasukan</div></div>
    <div class="stat-box"><div class="num text-danger" id="statExpense">Rp 0</div><div class="lbl">Pengeluaran</div></div>
  </div>

  <div class="section-header" style="padding:0 var(--space-5);margin-bottom:var(--space-3);">
    <h2>Akun</h2>
  </div>
  <div class="settings-list">
    <div class="settings-item">
      <i class="fa-solid fa-user item-icon"></i>
      <span class="item-label">Bergabung sejak</span>
      <span class="text-soft" id="joinDate" style="font-size:0.82rem;">-</span>
    </div>
  </div>

  <div class="section-header" style="padding:0 var(--space-5);margin-bottom:var(--space-3);">
    <h2>Tampilan</h2>
  </div>
  <div class="settings-list">
    <div class="settings-item">
      <i class="fa-solid fa-moon item-icon"></i>
      <span class="item-label">Mode Gelap</span>
      <label class="switch">
        <input type="checkbox" id="darkModeToggle" />
        <span class="track"></span>
      </label>
    </div>
  </div>

  <div class="section-header" style="padding:0 var(--space-5);margin-bottom:var(--space-3);">
    <h2>Data</h2>
  </div>
  <div class="settings-list">
    <button class="settings-item" id="exportCsvBtn" style="width:100%;text-align:left;">
      <i class="fa-solid fa-file-csv item-icon"></i>
      <span class="item-label">Export CSV</span>
      <i class="fa-solid fa-chevron-right chevron"></i>
    </button>
    <button class="settings-item" id="exportPdfBtn" style="width:100%;text-align:left;">
      <i class="fa-solid fa-file-pdf item-icon"></i>
      <span class="item-label">Export PDF</span>
      <i class="fa-solid fa-chevron-right chevron"></i>
    </button>
    <label class="settings-item" for="importFileInput" style="width:100%;text-align:left;cursor:pointer;">
      <i class="fa-solid fa-file-import item-icon"></i>
      <span class="item-label">Import Data (CSV)</span>
      <i class="fa-solid fa-chevron-right chevron"></i>
    </label>
    <input type="file" id="importFileInput" accept=".csv" class="hidden" />
    <button class="settings-item danger" id="resetDataBtn" style="width:100%;text-align:left;">
      <i class="fa-solid fa-broom item-icon"></i>
      <span class="item-label">Reset Semua Data</span>
      <i class="fa-solid fa-chevron-right chevron"></i>
    </button>
  </div>

  <div class="settings-list">
    <button class="settings-item danger" data-action="logout" style="width:100%;text-align:left;">
      <i class="fa-solid fa-right-from-bracket item-icon"></i>
      <span class="item-label">Keluar</span>
      <i class="fa-solid fa-chevron-right chevron"></i>
    </button>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i>Beranda</a>
    <a href="transaksi.html" class="nav-item"><i class="fa-solid fa-money-bill-transfer"></i>Transaksi</a>
    <a href="statistik.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i>Statistik</a>
    <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i>Profil</a>
  </nav>
</div>

<!-- Overlay & modal konfirmasi reset -->
<div class="overlay" id="overlay"></div>
<div class="modal-center" id="resetModal">
  <i class="fa-solid fa-triangle-exclamation warn-icon"></i>
  <h3>Reset Semua Data?</h3>
  <p>Semua transaksi yang tersimpan akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.</p>
  <div class="modal-actions">
    <button class="btn btn-outline btn-block" id="cancelResetBtn">Batal</button>
    <button class="btn btn-danger btn-block" id="confirmResetBtn">Reset</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
