<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lupa Password — DompetKu</title>
<meta name="description" content="Reset password akun DompetKu kamu." />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#22c55e" />
<link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png" />
<link rel="icon" type="image/png" href="assets/icon/favicon-32.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="auth-shell">

  <div class="auth-hero">
    <div class="logo-mark"><i class="fa-solid fa-key"></i></div>
    <h1>Lupa Password</h1>
    <p>Masukkan email akunmu, kami akan kirimkan link untuk membuat password baru.</p>
  </div>

  <form class="auth-form" id="forgotForm" novalidate>
    <div class="auth-alert" id="forgotAlert"></div>

    <div class="field">
      <label for="forgotEmail">Email</label>
      <div class="input-wrap">
        <i class="fa-regular fa-envelope field-icon"></i>
        <input class="has-icon" type="email" id="forgotEmail" placeholder="nama@email.com" required autocomplete="email" />
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">Kirim Link Reset</button>

    <p class="auth-switch">Ingat password? <a href="login.html">Kembali ke Masuk</a></p>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
