<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Masuk - DompetKu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.container{

width:100%;
max-width:420px;

}

.card{

background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.08);

animation:fade .7s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:90px;
height:90px;
background:#22c55e;
margin:auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:38px;
margin-bottom:20px;

}

h1{

text-align:center;
font-size:30px;
margin-bottom:8px;

}

p{

text-align:center;
color:#777;
margin-bottom:30px;

}

.input-group{

margin-bottom:18px;
position:relative;

}

.input-group input{

width:100%;
padding:15px 45px 15px 18px;
border:2px solid #ddd;
border-radius:15px;
outline:none;
font-size:15px;
transition:.3s;

}

.input-group input:focus{

border-color:#22c55e;

}

.input-group i{

position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
color:#999;

}

.option{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
font-size:14px;

}

.option label{

display:flex;
align-items:center;
gap:8px;
cursor:pointer;

}

.option a{

text-decoration:none;
color:#22c55e;
font-weight:600;

}

button{

width:100%;
padding:15px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
border-radius:15px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#16a34a;

}

.register{

text-align:center;
margin-top:25px;
font-size:14px;

}

.register a{

text-decoration:none;
color:#22c55e;
font-weight:600;

}

.footer{

text-align:center;
margin-top:30px;
font-size:13px;
color:#888;

}

.loading{

display:none;
margin-top:15px;
text-align:center;
color:#22c55e;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
<i class="fa-solid fa-wallet"></i>
</div>

<h1>DompetKu</h1>

<p>Kelola uang sakumu dengan lebih mudah.</p>

<form id="loginForm">

<div class="input-group">
<input
type="email"
id="email"
placeholder="Email"
required>
<i class="fa-solid fa-envelope"></i>
</div>

<div class="input-group">
<input
type="password"
id="password"
placeholder="Password"
required>
<i class="fa-solid fa-lock"></i>
</div>

<div class="option">

<label>

<input
type="checkbox"
id="remember">

Ingat perangkat ini

</label>

<a href="forgot-password.html">

Lupa Password?

</a>

</div>

<button type="submit">

Masuk

</button>

<div class="loading" id="loading">

<i class="fa fa-spinner fa-spin"></i>

Sedang masuk...

</div>

</form>

<div class="register">

Belum punya akun?

<a href="register.html">

Daftar

</a>

</div>

</div>

<div class="footer">

© 2026 DompetKu

</div>

</div>

<script type="module">

import {

initializeApp

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
browserLocalPersistence,
browserSessionPersistence,
setPersistence

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={

apiKey:"ISI_APIKEY",
authDomain:"ISI_AUTHDOMAIN",
projectId:"ISI_PROJECTID",
storageBucket:"ISI_STORAGE",
messagingSenderId:"ISI_SENDER",
appId:"ISI_APPID"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

loginForm.addEventListener("submit",async(e)=>{

e.preventDefault();

loading.style.display="block";

const email=email.value;

const password=password.value;

const remember=remember.checked;

try{

await setPersistence(

auth,

remember

?browserLocalPersistence

:browserSessionPersistence

);

await signInWithEmailAndPassword(

auth,

email,

password

);

window.location.href="dashboard.html";

}catch(err){

alert(err.message);

}

loading.style.display="none";

});

</script>

</body>
</html>
