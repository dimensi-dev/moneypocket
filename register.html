<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daftar — DompetKu</title>
<meta name="description" content="Buat akun DompetKu baru untuk mulai mencatat uang saku." />
<meta property="og:title" content="Daftar — DompetKu" />
<meta property="og:type" content="website" />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#22c55e" />
<link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png" />
<link rel="icon" type="image/png" href="assets/icon/favicon-32.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="auth-shell">

  <div class="auth-hero">
    <div class="logo-mark"><i class="fa-solid fa-wallet"></i></div>
    <h1>Buat Akun Baru</h1>
    <p>Daftar sekarang dan mulai kelola uang sakumu dengan lebih rapi.</p>
  </div>

  <form class="auth-form" id="registerForm" novalidate>
    <div class="auth-alert" id="registerAlert"></div>

    <div class="field">
      <label for="regName">Nama Lengkap</label>
      <div class="input-wrap">
        <i class="fa-regular fa-user field-icon"></i>
        <input class="has-icon" type="text" id="regName" placeholder="Nama kamu" required autocomplete="name" />
      </div>
    </div>

    <div class="field">
      <label for="regEmail">Email</label>
      <div class="input-wrap">
        <i class="fa-regular fa-envelope field-icon"></i>
        <input class="has-icon" type="email" id="regEmail" placeholder="nama@email.com" required autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label for="regPassword">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock field-icon"></i>
        <input class="has-icon" type="password" id="regPassword" placeholder="Minimal 6 karakter" required autocomplete="new-password" minlength="6" />
        <i class="fa-regular fa-eye toggle-visibility" data-target="regPassword"></i>
      </div>
      <div class="strength-meter" id="strengthMeter">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Daftar</button>

    <p class="auth-switch">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
  </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

<script>
document.querySelectorAll(".btn").forEach((btn) => {
  btn.addEventListener("click", function (e) {
    const rect = this.getBoundingClientRect();
    const ripple = document.createElement("span");
    const size = Math.max(rect.width, rect.height);
    ripple.className = "ripple";
    ripple.style.width = ripple.style.height = size + "px";
    ripple.style.left = e.clientX - rect.left - size / 2 + "px";
    ripple.style.top = e.clientY - rect.top - size / 2 + "px";
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});
</script>
</body>
</html>
